name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "22"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  repo-check:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check origin/${{ github.base_ref }}...HEAD
        if: github.event_name == 'pull_request'

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run Go tests
        run: make test

  web-check:
    name: Web lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint web
        working-directory: web
        run: npm run lint

      - name: Build web
        working-directory: web
        run: npm run build

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - repo-check
      - go-test
      - web-check
    if: always()
    steps:
      - name: Check required jobs
        run: |
          test "${{ needs.repo-check.result }}" = "success"
          test "${{ needs.go-test.result }}" = "success"
          test "${{ needs.web-check.result }}" = "success"

  compose-check:
    name: Compose acceptance check
    runs-on: ubuntu-latest
    needs:
      - ci-required
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run compose check
        run: make compose-check

      - name: Clean compose resources
        if: always()
        run: docker compose -f deploy/compose.mysql.yaml --profile verify down -v --remove-orphans

  docker-images:
    name: Build and push Docker Hub images
    runs-on: ubuntu-latest
    needs:
      - ci-required
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      IMAGE_NAME: ai-pub
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Docker Hub environment
        run: |
          set -euo pipefail
          test -n "${DOCKERHUB_USERNAME}" || (echo "DOCKERHUB_USERNAME is required" >&2; exit 1)
          test -n "${DOCKERHUB_TOKEN}" || (echo "DOCKERHUB_TOKEN is required" >&2; exit 1)
          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "DOCKERHUB_NAMESPACE=${DOCKERHUB_USERNAME}" >> "${GITHUB_ENV}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Compute image tags
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi

          IMAGE="docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}"

          {
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo "IMAGE=${IMAGE}"
          } >> "${GITHUB_ENV}"

      - name: Build and push app image
        run: |
          set -euo pipefail
          docker buildx build \
            --push \
            --target app \
            -t "${IMAGE}:${IMAGE_TAG}" \
            -t "${IMAGE}:latest" \
            .
