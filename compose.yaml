services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ai_pub
      MYSQL_USER: ai_pub
      MYSQL_PASSWORD: ai_pub
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 2s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      target: api
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      MYSQL_DSN: ai_pub:ai_pub@tcp(mysql:3306)/ai_pub?parseTime=true&charset=utf8mb4&loc=UTC
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-encryption-key}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ai-pub-dev-admin}
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "127.0.0.1:${APP_PORT:-18080}:80"
    depends_on:
      api:
        condition: service_started

  verify:
    profiles: [verify]
    build:
      context: .
      dockerfile: Dockerfile.verify
    environment:
      BASE_URL: http://api:8080
    command:
      - /bin/sh
      - -ec
      - |
        for i in $(seq 1 60); do
          curl -fsS http://api:8080/healthz >/dev/null 2>&1 && break
          sleep 1
        done
        curl -fsS http://api:8080/healthz >/dev/null
        for i in $(seq 1 30); do
          curl -fsS http://web/ >/dev/null 2>&1 && break
          sleep 1
        done
        curl -fsS http://web/ >/dev/null
        exec bash /app/scripts/local-functional-check.sh
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

volumes:
  mysql_data:
