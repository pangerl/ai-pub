# AI Pub demo 反向代理示例（Nginx）。
# 用法：
#   1. 将 server_name 改为你的域名。
#   2. 配置 TLS 证书（推荐 certbot 自动签发：certbot --nginx -d pub-demo.lanpang.top）。
#   3. nginx -t && systemctl reload nginx。
# 限流保护 /api/v1/auth/login（每 IP 每分钟 5 次，突发 5），请求体限制 1MB，转发到本地 18080。

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name pub-demo.lanpang.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pub-demo.lanpang.top;

    # TLS 证书（按实际路径替换）
    ssl_certificate     /etc/letsencrypt/live/pub-demo.lanpang.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pub-demo.lanpang.top/privkey.pem;

    # 请求体大小限制（防超大 JSON body DoS）
    client_max_body_size 1m;

    # 登录接口限流（补偿应用层无速率限制的 F2 风险）
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
