services:
  app:
    build:
      context: ..
      target: app
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      DB_DIALECT: sqlite
      SQLITE_PATH: /data/ai-pub.db
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-encryption-key}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ai-pub-dev-admin}
    volumes:
      - sqlite_data:/data
    ports:
      - "127.0.0.1:${APP_PORT:-18080}:8080"

  verify:
    profiles: [verify]
    build:
      context: ..
      dockerfile: Dockerfile.verify
    environment:
      BASE_URL: http://app:8080
    command:
      - /bin/sh
      - -ec
      - |
        for i in $(seq 1 60); do
          curl -fsS http://app:8080/healthz >/dev/null 2>&1 && break
          sleep 1
        done
        curl -fsS http://app:8080/healthz >/dev/null
        for i in $(seq 1 30); do
          curl -fsS http://app:8080/ >/dev/null 2>&1 && break
          sleep 1
        done
        curl -fsS http://app:8080/ >/dev/null
        exec bash /app/scripts/local-functional-check.sh
    depends_on:
      app:
        condition: service_started

volumes:
  sqlite_data:
