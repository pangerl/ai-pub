services:
  app:
    image: ${AI_PUB_IMAGE:-hxjagf/ai-pub:latest}
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      DB_DIALECT: sqlite
      SQLITE_PATH: /data/ai-pub.db
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-encryption-key}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ai-pub-dev-admin}
    volumes:
      - sqlite_data:/data
    ports:
      - "127.0.0.1:${APP_PORT:-18080}:8080"

volumes:
  sqlite_data:
